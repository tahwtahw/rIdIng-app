name: riding_app
description: rIdIng - 騎行車隊管理 App
publish_to: 'none'
version: 1.0.0+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  qr_flutter: ^4.1.0
  shared_preferences: ^2.3.0
  image_picker: ^1.0.7
  share_plus: ^10.0.0
  path_provider: ^2.1.0
  table_calendar: ^3.1.3
  intl: ^0.19.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2
  file_picker: ^8.1.2
  xml: ^6.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1

# App 圖標（icon.png 在專案上層目錄）
# 產生指令：flutter pub get && dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "../icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
